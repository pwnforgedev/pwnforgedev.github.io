<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" />
  <title>pwnforge.dev</title>
  <style>
    /* Global reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0e12;
      --fg: #f3f4f6;
      --accent: #00ffcc;
      --muted: rgba(243, 244, 246, 0.7);
      --panel: rgba(255, 255, 255, 0.03);
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
    }

    /* Subtle CRT-style background layers */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(18, 24, 38, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.025));
      background-size: 100% 4px, 6px 100%;
      background-repeat: repeat;
      opacity: 0.35;
      z-index: 0;
    }

    /* Minimal centered title block */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      z-index: 1;
      transform: translateY(-18px);
      user-select: none;
    }

    .title {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      color: var(--fg);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.12), 0 0 20px rgba(0, 255, 204, 0.08);
      white-space: nowrap;
    }

    .tagline {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1rem;
      border: 1px solid rgba(0, 255, 204, 0.12);
      border-radius: 999px;
      background: var(--panel);
      color: var(--muted);
      font-size: clamp(0.8rem, 1.4vw, 0.95rem);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      box-shadow: 0 0 24px rgba(0, 255, 204, 0.05);
      backdrop-filter: blur(10px);
    }

    .tagline::before,
    .tagline::after {
      color: rgba(0, 255, 204, 0.55);
      text-shadow: 0 0 10px rgba(0, 255, 204, 0.18);
    }

    .tagline::before {
      content: "[";
    }

    .tagline::after {
      content: "]";
    }

    .title .dot {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,
      100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .hero {
        gap: 0.85rem;
        padding: 1.5rem;
        transform: translateY(-10px);
      }

      .title {
        font-size: 1.9rem;
        letter-spacing: 0.08em;
      }

      .tagline {
        padding: 0.5rem 0.85rem;
        font-size: 0.76rem;
        letter-spacing: 0.14em;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="title">pwnforge<span class="dot">.</span>dev</h1>
    <p class="tagline">OffSec & Development</p>
  </main>
</body>
</html>
