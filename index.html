<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" />
  <title>pwnforge.dev</title>
  <style>
    /* Global reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0d0e12;
      --fg: #f3f4f6;
      --accent: #00ffcc;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      overflow: hidden;
      position: relative;
      background-color: var(--bg);
      color: var(--fg);
      font-family: 'Courier New', Courier, monospace;
    }

    /* Subtle CRT-style background layers */
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(18, 24, 38, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 255, 255, 0.025), rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.025));
      background-size: 100% 4px, 6px 100%;
      background-repeat: repeat;
      opacity: 0.35;
      z-index: 0;
    }

    /* Minimal centered title block */
    .hero {
      text-align: center;
      z-index: 1;
      transform: translateY(-1px);
    }

    .title {
      font-size: clamp(2rem, 4vw, 2.8rem);
      font-weight: 700;
      letter-spacing: 0.12em;
      line-height: 1;
      color: var(--fg);
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.12), 0 0 20px rgba(0, 255, 204, 0.08);
      user-select: none;
      white-space: nowrap;
    }

    .title .dot {
      color: var(--accent);
      text-shadow: 0 0 12px var(--accent);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%,
      100% { opacity: 1; }
      50% { opacity: 0; }
    }

    @media (max-width: 600px) {
      .title {
        font-size: 1.9rem;
        letter-spacing: 0.08em;
      }
    }
  </style>
</head>
<body>
  <main class="hero">
    <h1 class="title">pwnforge<span class="dot">.</span>dev</h1>
  </main>
</body>
</html>
